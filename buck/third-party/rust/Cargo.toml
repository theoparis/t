[package]
name = "rust-third-party"
version = "0.1.0"
edition = "2024"

[lib]
name = "dummy"
path = "dummy.rs"

[dependencies]
rootcause = { version = "0.12.1", default-features = false }
derive_more = { version = "2.1.1", default-features = false, features = [
    "display",
    "error",
    "from",
] }
reqwest = { version = "0.13.2", default-features = false, features = [
    "rustls-no-provider",
    "stream",
    "http2",
] }
rustls-graviola = { git = "https://github.com/ctz/graviola" }
graviola = { git = "https://github.com/ctz/graviola" }
goblin = { version = "0.10.5", default-features = false, features = [
    "endian_fd",
    "alloc",
    "mach32",
    "mach64",
    "elf32",
    "elf64",
] }
linked_list_allocator = "0.10.5"
spin = "0.10.0"
plist = { version = "1.8.0", default-features = false, features = ["serde"] }
serde = { version = "1.0.228", default-features = false, features = ["derive"] }
tokio = { version = "1.50.0", default-features = false, features = [
    "rt-multi-thread",
    "macros",
] }
clap = { version = "4.6.0", features = [
    "derive",
    "std",
    "help",
], default-features = false }
aes = "0.8.4"
hmac = "0.13.0"
sha1 = "0.11.0"
pbkdf2 = "0.12.2"
des = "0.8.1"
cbc = { version = "0.1.2", features = ["alloc"] }
hex = "0.4.3"
cipher = { version = "0.5.1", features = ["block-padding"] }
log = { version = "0.4.29", default-features = false }
crc32fast = { version = "1.5.0", default-features = false }
md5 = { version = "0.8.0", default-features = false }
indicatif = "0.18.4"
byteorder = { version = "1.5", default-features = false }
bitflags = { version = "2.11.0", default-features = false }
libc = { version = "0.2.183", default-features = false }
xattr = "1.6.1"
rustix = { version = "1.1.4", default-features = false, features = [
    "fs",
    "std",
] }
errno = { version = "0.3.14", default-features = false }
zip = { version = "=8.4.0", default-features = false, features = [
    "deflate",
] }
rayon = "1.11"
futures-util = "0.3"
unicode-normalization = { version = "0.1", default-features = false }
fatfs = "0.3"
fscommon = "0.1"
serde_bytes = "0.11"
getrandom = "0.4"
flate2 = "1.1"
hashbrown = "0.16"
memmap2 = "0.9"
binrw = { version = "0.15.1", default-features = false }
zlib-rs = { version = "0.6.3", default-features = false, features = [
    "__internal-api",
] }
rand_core = { version = "0.10.0", default-features = false }
rand_chacha = { version = "0.10.0", default-features = false }
lzma-rust2 = { version = "=0.16.2", default-features = false }
lz4_flex = { git = "https://github.com/yujincheng08/lz4_flex", branch = "hc" }
zstd-safe = { version = "7.2.4", default-features = false }
rmcp = { version = "1.3.0", features = ["transport-io"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
rasn = "0.28.10"
cranelift = { version = "0.130.0", features = ["jit", "module", "native"] }
wgpu = { version = "29.0.1", default-features = false, features = [
    "wgsl",
    "vulkan",
    "vulkan-portability",
    "metal",
    "gles",
] }
winit = { version = "0.31.0-beta.2", default-features = false, features = [
    "wayland",
] }
pollster = "0.4.0"
bytemuck = { version = "1.25.0", default-features = false, features = [
    "derive",
] }
image = { version = "0.25.10", default-features = false, features = ["png"] }
glam = { version = "0.32.1", default-features = false, features = [
    "std",
    "bytemuck",
    "fast-math",
    "core-simd",
] }
objc2 = "0.6.4"
objc2-app-kit = "0.3.2"
objc2-quartz-core = "0.3.2"
